name: PR checks

# Enforces the naming conventions the release automation depends on. A PR that
# fails any job cannot be merged (wire these in as required status checks:
# Settings -> Branches -> main -> Require status checks to pass).
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  # The PR title becomes the commit subject on a squash-merge, and that subject
  # is what drives the version bump. So the title itself must be conventional.
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            style
            docs
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start lower-case (not a capital letter).

  # Branches must read as `type/short-description`, e.g. feat/dev-mode.
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          branch="${{ github.head_ref }}"
          echo "Branch: $branch"
          pattern='^(feat|fix|perf|refactor|style|docs|test|build|ci|chore|revert)/[a-z0-9._-]+$'
          if ! echo "$branch" | grep -Eq "$pattern"; then
            echo "::error::Branch '$branch' does not match $pattern"
            echo "Rename it, e.g.  git branch -m feat/short-description"
            exit 1
          fi

  # Every individual commit must be conventional too, so a merge-commit (not
  # just a squash) still yields a clean, parseable history on main.
  commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint PR commits
        run: npx commitlint --from "origin/${{ github.base_ref }}" --to "${{ github.event.pull_request.head.sha }}" --verbose
