name: Release

# Tag a version to cut a release:
#   npm version 0.1.1 --no-git-tag-version && git commit -am "release: v0.1.1"
#   git tag v0.1.1 && git push origin main --tags
#
# The release is published immediately (not a draft) and marked "latest", so its
# download URLs - including latest.json for the in-app updater - are live at once.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.1.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # Rust release builds are the slow part; cache them between runs.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - name: Build and draft release
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the binary by src-tauri/build.rs. Public identifier, not a
          # secret - it is a repo VARIABLE, not a repo secret. If unset the app
          # still builds and reports GitHub login as "not configured".
          FASTDASH_GITHUB_CLIENT_ID: ${{ vars.FASTDASH_GITHUB_CLIENT_ID }}
          # Sign the updater artifacts. The public half lives in tauri.conf.json
          # (plugins.updater.pubkey); these two are repo secrets. The password
          # secret may be empty if the key was generated without one.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "fastdash ${{ github.event.inputs.tag || github.ref_name }}"
          # Publish immediately (not a draft) so the release is marked "latest"
          # and its latest.json is reachable at the /releases/latest/download/
          # URL the installed app polls - otherwise auto-update never fires.
          releaseDraft: false
          prerelease: false
          # Emit and upload latest.json so installed apps self-update.
          uploadUpdaterJson: true

      # The portable zip is what install.ps1 and Scoop consume. It avoids the
      # installer entirely: no UAC, no elevation, no SmartScreen.
      - name: Build portable zip
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $tag.TrimStart("v")
          $staging = "portable/fastdash"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "src-tauri/target/release/fastdash.exe" $staging
          Copy-Item "LICENSE","README.md" $staging
          $zip = "fastdash_${version}_x64_portable.zip"
          Compress-Archive -Path "$staging/*" -DestinationPath $zip -Force
          "ZIP_NAME=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # SHA256 for every asset, so install.ps1 and the Scoop manifest can verify
      # what they downloaded instead of trusting the transport alone.
      - name: Generate checksums
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $files = @($env:ZIP_NAME) + (
            Get-ChildItem -Recurse -File `
              -Path "src-tauri/target/release/bundle/nsis","src-tauri/target/release/bundle/msi" `
              -Include *.exe,*.msi -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          )
          $lines = foreach ($f in $files) {
            $h = (Get-FileHash -Algorithm SHA256 -Path $f).Hash.ToLower()
            "$h  $(Split-Path $f -Leaf)"
          }
          $lines | Out-File -FilePath "SHA256SUMS.txt" -Encoding ascii
          Get-Content SHA256SUMS.txt

      - name: Attach portable zip and checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload $tag $env:ZIP_NAME SHA256SUMS.txt --clobber
