name: Release

# Fully automatic releases. Every push to main is inspected: if it contains
# releasable Conventional Commits (feat: / fix: / a `!` or BREAKING CHANGE
# footer), the version is bumped, tagged, built, and published - and installed
# apps pick it up via the in-app updater. Pushes with only chore/docs/refactor
# commits produce no release.
on:
  push:
    branches:
      - main
  # Manual escape hatch: force a release even if commit analysis wouldn't.
  workflow_dispatch:
    inputs:
      bump:
        description: "Force a release with this bump"
        type: choice
        default: patch
        options: [patch, minor, major]

permissions:
  contents: write

# Never let two releases race (e.g. rapid merges).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. Decide the next version from Conventional Commits, bump every manifest,
  #    commit the bump to main, and create the tag. Cheap Linux job.
  # ---------------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    # Skip the run we ourselves push, so the bump commit can't re-trigger us.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    outputs:
      released: ${{ steps.decide.outputs.released }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history + tags for commit analysis
          # RELEASE_TOKEN (a PAT) lets the bump commit + tag push past a strict
          # ruleset on main; falls back to the default token if unset.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      # Compute the next version WITHOUT creating anything (dry_run). Empty
      # output => no releasable commits => we stop.
      - name: Analyze commits
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bump || false }}
          tag_prefix: v
          dry_run: true

      - name: Decide whether to release
        id: decide
        run: |
          v="${{ steps.semver.outputs.new_version }}"
          if [ -z "$v" ]; then
            echo "No releasable commits since the last tag - skipping."
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$v" >> "$GITHUB_OUTPUT"
            echo "tag=v$v" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump manifests, commit, and tag
        if: steps.decide.outputs.released == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/bump-version.sh "${{ steps.decide.outputs.version }}"
          git commit -am "chore(release): ${{ steps.decide.outputs.tag }} [skip ci]"
          git tag "${{ steps.decide.outputs.tag }}"
          git push origin HEAD:main --follow-tags

  # ---------------------------------------------------------------------------
  # 2. Build the signed installers + portable zip at the tagged commit and
  #    publish the release. Only runs when step 1 actually cut a version.
  # ---------------------------------------------------------------------------
  build:
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }} # build the bumped code

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # Rust release builds are the slow part; cache them between runs.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the binary by src-tauri/build.rs. Public identifier, not a
          # secret - it is a repo VARIABLE, not a repo secret. If unset the app
          # still builds and reports GitHub login as "not configured".
          FASTDASH_GITHUB_CLIENT_ID: ${{ vars.FASTDASH_GITHUB_CLIENT_ID }}
          # Signs the updater artifacts. The private key and its password are
          # repo SECRETS; the matching public key is baked into tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "fastdash ${{ needs.version.outputs.tag }}"
          # Published immediately (not a draft) so the updater endpoint,
          # releases/latest/download/latest.json, resolves for installed apps.
          releaseDraft: false
          prerelease: false
          # Emit and upload latest.json so the in-app updater can find releases.
          uploadUpdaterJson: true

      # The portable zip is what install.ps1 and Scoop consume. It avoids the
      # installer entirely: no UAC, no elevation, no SmartScreen.
      - name: Build portable zip
        shell: pwsh
        run: |
          $tag = "${{ needs.version.outputs.tag }}"
          $version = $tag.TrimStart("v")
          $staging = "portable/fastdash"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "src-tauri/target/release/fastdash.exe" $staging
          Copy-Item "LICENSE","README.md" $staging
          $zip = "fastdash_${version}_x64_portable.zip"
          Compress-Archive -Path "$staging/*" -DestinationPath $zip -Force
          "ZIP_NAME=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # SHA256 for every asset, so install.ps1 and the Scoop manifest can verify
      # what they downloaded instead of trusting the transport alone.
      - name: Generate checksums
        shell: pwsh
        run: |
          $files = @($env:ZIP_NAME) + (
            Get-ChildItem -Recurse -File `
              -Path "src-tauri/target/release/bundle/nsis","src-tauri/target/release/bundle/msi" `
              -Include *.exe,*.msi -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          )
          $lines = foreach ($f in $files) {
            $h = (Get-FileHash -Algorithm SHA256 -Path $f).Hash.ToLower()
            "$h  $(Split-Path $f -Leaf)"
          }
          $lines | Out-File -FilePath "SHA256SUMS.txt" -Encoding ascii
          Get-Content SHA256SUMS.txt

      - name: Attach portable zip and checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ needs.version.outputs.tag }}"
          gh release upload $tag $env:ZIP_NAME SHA256SUMS.txt --clobber
